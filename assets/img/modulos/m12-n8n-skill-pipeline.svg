<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 430">
<rect width="1200" height="430" fill="#f7fbff"/>
<text x="50" y="60" font-family="Arial" font-size="34" font-weight="800" fill="#003a70">Skill reutilizável como pipeline</text>
<g font-family="Arial" text-anchor="middle" font-size="16" font-weight="700">
<rect x="60" y="160" width="160" height="92" rx="18" fill="#fff" stroke="#0b5aa6" stroke-width="3"/><text x="140" y="200" fill="#003a70">Entrada</text><text x="140" y="226" fill="#334">e-mail + módulo</text>
<rect x="275" y="160" width="160" height="92" rx="18" fill="#fff" stroke="#009a9a" stroke-width="3"/><text x="355" y="200" fill="#003a70">Validar</text><text x="355" y="226" fill="#334">formato + regra</text>
<rect x="490" y="160" width="160" height="92" rx="18" fill="#fff" stroke="#3aa655" stroke-width="3"/><text x="570" y="200" fill="#003a70">Consultar</text><text x="570" y="226" fill="#334">fonte oficial</text>
<rect x="705" y="160" width="160" height="92" rx="18" fill="#fff" stroke="#6046a6" stroke-width="3"/><text x="785" y="200" fill="#003a70">LLM?</text><text x="785" y="226" fill="#334">só redação</text>
<rect x="920" y="160" width="160" height="92" rx="18" fill="#fff" stroke="#c8102e" stroke-width="3"/><text x="1000" y="200" fill="#003a70">Saída</text><text x="1000" y="226" fill="#334">resposta + log</text>
</g>
<path d="M220 206H275M435 206H490M650 206H705M865 206H920" stroke="#0b5aa6" stroke-width="5" stroke-linecap="round"/>
<text x="70" y="325" font-family="Arial" font-size="18" fill="#334">Regra do módulo: a LLM não decide status oficial; ela pode ajudar a redigir, classificar texto livre ou resumir.</text>
</svg>